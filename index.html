<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR最終調整版</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #28a745; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="start-button" onclick="startAR()">ARカメラを起動</button>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium"
        cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        
        <a-assets>
            <video id="v" src="./intro_video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t" mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="1" position="0 0 0.1"></a-video>

            <a-entity id="link-button" class="clickable"
                position="0 -0.7 0.2"
                geometry="primitive: plane; width: 0.8; height: 0.2"
                material="color: #007bff; opacity: 0.9"
                text="value: CLICK HERE; align: center; width: 4; color: white">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#v");
        const btn = document.querySelector("#start-button");
        const linkBtn = document.querySelector("#link-button");

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            btn.style.display = "none";
            arSystem.start();
            
            video.play().then(() => {
                video.pause();
                video.muted = false;
            });
        }

        // ボタンのクリック/タップ処理（JS側で確実に捕まえる）
        linkBtn.addEventListener('click', function (evt) {
            console.log("Button Clicked!");
            // ここに飛ばしたいURLを入れる
            window.location.href = 'https://www.google.com';
        });

        document.querySelector('#t').addEventListener("targetFound", () => {
            video.play();
        });

        document.querySelector('#t').addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
