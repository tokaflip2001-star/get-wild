<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR最終完成版_動画リペア</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; background: #000; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #28a745; color: white;
            border: none; border-radius: 50px; font-size: 20px; font-weight: bold;
        }
        #link-button {
            display: none; position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
            z-index: 8888; padding: 15px 30px; background: rgba(0, 123, 255, 0.9); color: white;
            border: 2px solid white; border-radius: 10px; font-size: 18px; font-weight: bold;
            text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button id="start-button" onclick="startAR()">ARカメラを起動</button>
    <a id="link-button" href="https://www.google.com">詳細はこちら ＞</a>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true, precision: medium">
        
        <a-assets>
            <video id="v" src="./intro_video.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline muted autoplay></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="t" mindar-image-target="targetIndex: 0">
            <a-video id="ar-video" src="#v" width="1" height="1" position="0 0 0.1" visible="false"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector("#v");
        const arVideoObj = document.querySelector("#ar-video");
        const startBtn = document.querySelector("#start-button");
        const linkBtn = document.querySelector("#link-button");

        function startAR() {
            const sceneEl = document.querySelector('a-scene');
            const arSystem = sceneEl.systems["mindar-image-system"];
            startBtn.style.display = "none";
            
            // 【重要】ボタンを押した瞬間に、ミュート状態で動画を強制再生
            video.play();
            
            // その後でARシステムを開始
            arSystem.start();
        }

        const targetEl = document.querySelector('#t');

        targetEl.addEventListener("targetFound", () => {
            // 画像を見つけたら、ミュートを解除して表示をONにする
            video.muted = false;
            arVideoObj.setAttribute("visible", "true");
            linkBtn.style.display = "block";
        });

        targetEl.addEventListener("targetLost", () => {
            arVideoObj.setAttribute("visible", "false");
            linkBtn.style.display = "none";
        });
    </script>
</body>
</html>
